name: CI Build

on:
  push:
    branches:
      - main
      - fix-windows-ci-test-manifest

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.1
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libvulkan-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Install Visual C++ Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install vcredist140 -y

      - name: Setup Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.296.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Fix Vulkan lib naming (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vulkanLib = Join-Path $env:VULKAN_SDK "lib"
          $vulkanBin = Join-Path $env:VULKAN_SDK "Bin"
          if (Test-Path "$vulkanLib\vulkan-1.lib") {
            Copy-Item "$vulkanLib\vulkan-1.lib" "$vulkanLib\vulkan.lib"
            Write-Host "Created vulkan.lib from vulkan-1.lib in $vulkanLib"
          }
          echo "LIB=$vulkanLib;$env:LIB" >> $env:GITHUB_ENV
          echo "$vulkanBin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify FFmpeg tools
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Run Rust tests (Windows)
        if: runner.os == 'Windows'
        working-directory: src-tauri
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $targetDir = Join-Path (Get-Location) "target"
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          $manifestPath = Join-Path $targetDir "ci.common-controls.manifest"
          @"
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0">
            <dependency>
              <dependentAssembly>
                <assemblyIdentity
                  type="win32"
                  name="Microsoft.Windows.Common-Controls"
                  version="6.0.0.0"
                  processorArchitecture="*"
                  publicKeyToken="6595b64144ccf1df"
                  language="*" />
              </dependentAssembly>
            </dependency>
          </assembly>
          "@ | Set-Content -Path $manifestPath -Encoding utf8

          $env:CARGO_ENCODED_RUSTFLAGS = @(
            "-C",
            "target-feature=+crt-static",
            "-C",
            "link-arg=/MANIFEST:EMBED",
            "-C",
            "link-arg=/MANIFESTINPUT:$manifestPath"
          ) -join [char]31

          function Get-LatestLibTestExe {
            $depsDir = Join-Path (Get-Location) "target\debug\deps"
            Get-ChildItem -Path $depsDir -Filter "mediaflow_lib-*.exe" |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
          }

          function Show-WindowsCrashDiagnostics {
            $libTestExe = Get-LatestLibTestExe

            Write-Host "::group::Windows test crash diagnostics"
            if ($libTestExe) {
              Write-Host "lib test executable: $($libTestExe.FullName)"

              $cdb = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\Debuggers\x64\cdb.exe"
              if (Test-Path $cdb) {
                & $cdb -c "g;qd" $libTestExe.FullName
              }

              $dumpbin = Get-Command dumpbin.exe -ErrorAction SilentlyContinue
              if ($dumpbin) {
                & $dumpbin.Source /dependents $libTestExe.FullName
              }
            }
            Write-Host "::endgroup::"
          }

          function Invoke-LibHarness {
            param([string[]]$Args)

            $libTestExe = Get-LatestLibTestExe
            if (-not $libTestExe) {
              throw "Could not locate compiled mediaflow_lib test executable"
            }

            & $libTestExe.FullName @Args
            if ($LASTEXITCODE -eq 0) {
              return
            }

            Show-WindowsCrashDiagnostics
            throw "Windows lib test harness failed with exit code $LASTEXITCODE"
          }

          # Avoid the Tauri bin test target on Windows: it collides with the embedded app manifest.
          cargo test --no-run --lib

          $depsDir = Join-Path (Get-Location) "target\debug\deps"
          $vulkanDll = Join-Path $env:VULKAN_SDK "Bin\vulkan-1.dll"

          if (!(Test-Path $vulkanDll)) {
            throw "Missing Vulkan loader DLL: $vulkanDll"
          }

          $vulkanDllInDeps = Join-Path $depsDir "vulkan-1.dll"
          Copy-Item $vulkanDll $vulkanDllInDeps -Force
          Write-Host "Copied Vulkan loader to $vulkanDllInDeps"

          $pathEntries = @(
            $depsDir,
            (Split-Path -Parent $vulkanDll)
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique

          $env:PATH = (($pathEntries -join ';') + ';' + $env:PATH)

          where.exe ffmpeg
          where.exe ffprobe
          where.exe vulkan-1.dll
          if ($LASTEXITCODE -ne 0) {
            throw "vulkan-1.dll not found on PATH after setup"
          }

          Invoke-LibHarness
          Invoke-LibHarness "--ignored"

      - name: Run Rust tests
        if: runner.os != 'Windows'
        working-directory: src-tauri
        run: |
          cargo test
          cargo test -- --ignored

      - name: Build Tauri app
        run: pnpm tauri build

  create-version-tag:
    name: Create Version Tag
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release version
        id: version
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version\s*=\s*"([^"]+)"/m);

          if (!cargoVersionMatch) {
            throw new Error('Unable to read version from src-tauri/Cargo.toml');
          }

          const versions = {
            packageJson: packageJson.version,
            tauriConfig: tauriConfig.version,
            cargoToml: cargoVersionMatch[1]
          };

          const uniqueVersions = [...new Set(Object.values(versions))];
          if (uniqueVersions.length !== 1) {
            const details = Object.entries(versions).map(([name, value]) => `${name}=${value}`).join(', ');
            throw new Error(`Project versions are not aligned: ${details}`);
          }

          console.log(`version=${packageJson.version}`);
          console.log(`tag=v${packageJson.version}`);
          NODE

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Skip existing tag
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping auto-tagging."
